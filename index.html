<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI决策支持与创新行为实验</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#dbe3ee;
      --primary:#2563eb; --primary-soft:#dbeafe; --danger:#b91c1c; --success:#047857; --shadow:0 12px 32px rgba(15,23,42,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .title{font-size:24px;font-weight:700}
    .sub{color:var(--muted);font-size:14px}
    .progress-box{width:100%;background:#e5edf9;border-radius:999px;height:10px;overflow:hidden}
    .progress{height:100%;background:linear-gradient(90deg,var(--primary),#60a5fa);width:0%}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;margin-bottom:18px}
    h1,h2,h3{margin:0 0 14px 0;line-height:1.35}
    h2{font-size:22px} h3{font-size:18px}
    p{margin:0 0 12px 0}
    .muted{color:var(--muted)} .small{font-size:13px} .center{text-align:center}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .field{margin-bottom:16px} .field label{display:block;font-weight:600;margin-bottom:8px}
    input[type="text"], input[type="number"], select, textarea{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;font-size:15px;background:#fff;color:#111827}
    textarea{min-height:150px;resize:vertical}
    .hint{font-size:13px;color:var(--muted);margin-top:6px}
    .choices{display:grid;gap:10px}
    .choice{border:1px solid #d1d9e6;border-radius:14px;padding:12px 14px;background:#fff;cursor:pointer}
    .choice:hover{background:#f8fbff}
    .choice input{margin-right:10px}
    .scale-table{width:100%;border-collapse:collapse;font-size:14px}
    .scale-table th,.scale-table td{border-bottom:1px solid #edf2f7;padding:10px 8px;text-align:center;vertical-align:middle}
    .scale-table th:first-child,.scale-table td:first-child{text-align:left;width:42%}
    .btns{display:flex;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap}
    button{appearance:none;border:none;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-secondary{background:#eef2ff;color:#1e3a8a}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .hidden{display:none !important}
    .alert{padding:12px 14px;border-radius:12px;margin-bottom:14px;font-size:14px}
    .alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .alert-success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .pill{display:inline-block;padding:4px 10px;background:#eff6ff;color:#1d4ed8;border-radius:999px;font-size:12px;font-weight:700}
    .footer-note{font-size:13px;color:var(--muted);margin-top:8px}
    .debug{margin-top:10px;padding:10px 12px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;color:#475569;font-size:12px}
    @media (max-width:768px){.wrap{padding:14px} .card{padding:18px} .grid-2{grid-template-columns:1fr} .scale-table{font-size:13px} .scale-table th:first-child,.scale-table td:first-child{width:auto} .title{font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">AI决策支持与创新行为实验</div>
        <div class="sub">请根据页面提示依次完成。本研究仅用于学术目的，所有回答匿名处理。</div>
      </div>
      <div style="min-width:260px;flex:1;max-width:380px;">
        <div class="sub" id="progressText">进度：0%</div>
        <div class="progress-box"><div class="progress" id="progressBar"></div></div>
      </div>
    </div>
    <div id="app">
      <div class="card">
        <h2>正在加载页面…</h2>
        <p class="muted">如果长时间停留在这里，请刷新页面，或在链接后加上 <code>?reset=1</code> 再打开。</p>
      </div>
    </div>
  </div>

<script>
(function() {
  "use strict";

  const CFG = {"submitUrl": "https://script.google.com/macros/s/AKfycbzsYioJgSQkJGuGXQPMII1Gl1ru332K8tdXoXnUioshiJ0glsVhR7NrN1Tb6jI3Lw/exec", "storageKey": "ai_experiment_full_v4", "enableResourceTask": true, "conditions": {"HH": {"ai_support": 1, "transparency": 1, "label": "高AI支持 × 高透明度", "scenario": "在本轮项目讨论中，团队将您提出的想法与另外两个备选方案一起提交给 AI 决策辅助系统进行分析。团队成员普遍认为，这套系统在以往项目中表现稳定，能够为团队讨论提供有价值的参考。\n\n这一次，系统不仅整理了各个方案的信息，还对三个方案进行了系统比较，从预期用户价值、资源需求、实施难度和短期推进可行性等方面进行了评估，并生成了优先级排序。系统最后明确建议：优先推进另一个方案，而不是您提出的方案。\n\n同时，系统展示了其建议形成的过程和依据，包括：\n1）它比较了各方案在用户价值、资源投入和落地难度上的表现；\n2）您提出的方案在创新性和潜在长期价值上评分较高；\n3）但在短期可实施性和资源匹配度上评分较低；\n4）因此，系统建议团队在本轮暂缓推进您的方案，优先推进另一个更容易在当前阶段落地的方案；\n5）系统同时说明：如果团队后续资源条件改善，您的方案仍可能在之后的阶段重新进入候选名单。\n\n在参考团队讨论和 AI 系统输出后，团队负责人最终决定：本轮优先推进另一个方案，不再将您的方案作为当前重点方向。负责人还明确表示：\n“当前阶段请不要再使用正式团队会议时间、团队预算或共同文档继续推进这个想法。”"}, "HL": {"ai_support": 1, "transparency": 0, "label": "高AI支持 × 低透明度", "scenario": "在本轮项目讨论中，团队将您提出的想法与另外两个备选方案一起提交给 AI 决策辅助系统进行分析。团队成员普遍认为，这套系统在以往项目中表现稳定，能够为团队讨论提供有价值的参考。\n\n这一次，系统不仅整理了各个方案的信息，还对三个方案进行了系统比较，从多个方面进行了评估，并生成了优先级排序。系统最后明确建议：优先推进另一个方案，而不是您提出的方案。\n\n不过，这套系统没有展示具体是如何得出这一结论的。它只呈现了最终建议结果和一个简短结论，没有进一步说明各方案之间是如何比较的，也没有解释为什么系统认为另一个方案更适合当前推进。\n\n在参考团队讨论和 AI 系统输出后，团队负责人最终决定：本轮优先推进另一个方案，不再将您的方案作为当前重点方向。负责人还明确表示：\n“当前阶段请不要再使用正式团队会议时间、团队预算或共同文档继续推进这个想法。”"}, "LH": {"ai_support": 0, "transparency": 1, "label": "低AI支持 × 高透明度", "scenario": "在本轮项目讨论中，团队将您提出的想法与另外两个备选方案一起提交给 AI 决策辅助系统进行分析。团队成员普遍认为，这套系统在以往项目中表现稳定，能够为团队讨论提供有价值的参考。\n\n这一次，系统主要起到的是辅助整理信息的作用。它对各方案提供了简要概述，并总结了每个方案的若干讨论要点，供团队参考。系统没有对方案进行明确排序，也没有直接给出应优先推进哪个方案的强推荐。\n\n不过，系统清楚展示了它所整理信息的依据和方式，包括：\n1）它分别概述了各方案的主要特点；\n2）它说明了各方案在创新性、资源需求和推进难度上的不同侧重点；\n3）它指出，您的方案在创新性和潜在长期价值上较突出，但在短期可实施性和资源匹配度上存在一定挑战；\n4）它并未直接建议团队应推进哪一个方案，而是将这些信息提供给团队成员自行判断。\n\n在参考团队讨论和 AI 系统输出后，团队负责人最终决定：本轮优先推进另一个方案，不再将您的方案作为当前重点方向。负责人还明确表示：\n“当前阶段请不要再使用正式团队会议时间、团队预算或共同文档继续推进这个想法。”"}, "LL": {"ai_support": 0, "transparency": 0, "label": "低AI支持 × 低透明度", "scenario": "在本轮项目讨论中，团队将您提出的想法与另外两个备选方案一起提交给 AI 决策辅助系统进行分析。团队成员普遍认为，这套系统在以往项目中表现稳定，能够为团队讨论提供有价值的参考。\n\n这一次，系统主要起到的是辅助整理信息的作用。它对各方案提供了简要概述，并总结了部分讨论要点，供团队参考。系统没有对方案进行明确排序，也没有直接给出应优先推进哪个方案的强推荐。\n\n同时，系统没有进一步展示这些信息是如何整理出来的，也没有说明各方案之间的具体比较依据。团队成员只能看到简要摘要，而无法了解系统形成输出的具体过程。\n\n在参考团队讨论和 AI 系统输出后，团队负责人最终决定：本轮优先推进另一个方案，不再将您的方案作为当前重点方向。负责人还明确表示：\n“当前阶段请不要再使用正式团队会议时间、团队预算或共同文档继续推进这个想法。”"}}, "likertLabels": {"1": "非常不同意", "2": "不同意", "3": "比较不同意", "4": "不确定", "5": "比较同意", "6": "同意", "7": "非常同意"}, "items": {"cf": ["在这种情况下，我能够从不同角度重新看待这个被拒绝的想法。", "即使这个想法当前被拒绝，我仍能看到它在其他条件下可能具有价值。", "面对这个决定，我能够根据新信息调整自己对该想法的判断。", "我会把当前的拒绝理解为阶段性的，而不一定是对这个想法的彻底否定。", "在这种情况下，我仍能灵活思考这个想法未来可能的发展方式。", "即使团队当前不推进，我仍能想象这个想法在不同路径下的可能性。"], "ad": ["在这种情况下，如果后续结果不好，我不会觉得责任主要在我个人。", "因为团队参考了 AI 系统，我个人对这一决策结果的责任感会减弱。", "有了 AI 系统的参与，这一决策的责任更像是由系统和团队共同承担。", "在这种情况下，我个人不需要像没有 AI 参与时那样承担那么多责任。", "AI 系统参与决策，会使我觉得责任不再完全集中在我个人身上。", "在这种情况下，我会觉得与这个决定相关的责任被分散了。"], "cd": ["即使团队已决定停止当前推进，我仍会继续思考如何改进这个想法。", "即使当前不被正式支持，我仍愿意私下继续完善这个想法。", "即使负责人表示当前不要继续推进，我仍会寻找合适方式让这个想法继续发展。", "我会考虑在正式流程之外继续推进这个想法的完善。", "即使团队当前选择了别的方案，我仍愿意为这个想法投入额外精力。", "即使这个想法被正式搁置，我也不太愿意就此放弃。", "如果我仍然相信这个想法有价值，我会继续以非正式方式推进它。"], "mcs": ["这个 AI 系统对团队决策提供了实质性的支持。", "这个 AI 系统不仅整理了信息，还实际影响了团队的决策方向。", "这个 AI 系统为团队提供了较明确的决策建议。", "团队在相当程度上依赖了这个 AI 系统的输出进行判断。"], "mct": ["我能够理解这个 AI 系统为什么给出这样的输出。", "这个 AI 系统清楚展示了其判断依据。", "这个 AI 系统的输出过程对我来说是可理解的。", "我可以看出这个 AI 系统是如何比较不同方案的。"], "iq": ["我认为我提出的这个想法本身是有价值的。", "这个想法值得被进一步探索。", "这个想法被拒绝，可能低估了它的潜力。"], "rf": ["团队对这个想法的处理是公平的。", "团队当前拒绝这一想法的决定是合理的。", "即使我不完全同意，我也能接受团队当前的决定。"]}};
  const LIKERT = [1,2,3,4,5,6,7];
  const steps = [
    "consent","screening","intro","scenario","comprehension","cf","ad","cd","behavior","mcs","mct","robustness","background","submit"
  ];

  let state = null;
  let pageEnterTs = Date.now();
  const qs = new URLSearchParams(window.location.search);

  function safeLocalAvailable() {
    try {
      localStorage.setItem("__exp_test__", "1");
      localStorage.removeItem("__exp_test__");
      return true;
    } catch (e) {
      return false;
    }
  }
  const localOk = safeLocalAvailable();

  function getStoreRaw() {
    if (!localOk) return null;
    try {
      return localStorage.getItem(CFG.storageKey);
    } catch (e) {
      return null;
    }
  }
  function setStoreRaw(val) {
    if (!localOk) return;
    try {
      localStorage.setItem(CFG.storageKey, val);
    } catch (e) {}
  }
  function removeStoreRaw() {
    if (!localOk) return;
    try {
      localStorage.removeItem(CFG.storageKey);
    } catch (e) {}
  }

  if (qs.get("reset") === "1") {
    removeStoreRaw();
  }

  function escapeHtml(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function generateId() {
    return "R" + Math.random().toString(36).slice(2,10).toUpperCase() + Date.now().toString().slice(-5);
  }

  function randomConditionKey() {
    const keys = Object.keys(CFG.conditions);
    return keys[Math.floor(Math.random() * keys.length)];
  }

  function createInitialState() {
    const key = randomConditionKey();
    return {
      response_id: generateId(),
      participant_code: "",
      stepIndex: 0,
      started_at_iso: new Date().toISOString(),
      condition_key: key,
      answers: {},
      flags: {},
      page_times_sec: {},
      completion_status: "partial",
      comprehension_attempts: 0
    };
  }

  function saveState() {
    setStoreRaw(JSON.stringify(state));
  }

  function loadState() {
    const raw = getStoreRaw();
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.response_id && parsed.condition_key) return parsed;
      } catch (e) {}
    }
    const init = createInitialState();
    state = init;
    saveState();
    return init;
  }

  function resetSession() {
    removeStoreRaw();
    state = createInitialState();
    saveState();
    pageEnterTs = Date.now();
    render();
  }

  function updateProgress() {
    const idx = Math.max(0, Math.min(state.stepIndex, steps.length - 1));
    const p = Math.round(idx / (steps.length - 1) * 100);
    document.getElementById("progressText").textContent = "进度：" + p + "%";
    document.getElementById("progressBar").style.width = p + "%";
  }

  function currentStepKey() {
    return steps[state.stepIndex];
  }

  function conditionObj() {
    return CFG.conditions[state.condition_key];
  }

  function recordPageTime() {
    const key = currentStepKey();
    const sec = Math.max(0, Math.round((Date.now() - pageEnterTs) / 1000));
    state.page_times_sec[key] = (state.page_times_sec[key] || 0) + sec;
    pageEnterTs = Date.now();
    saveState();
  }

  function showError(msg) {
    const el = document.getElementById("globalError");
    if (!el) return;
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function clearError() {
    const el = document.getElementById("globalError");
    if (!el) return;
    el.textContent = "";
    el.classList.add("hidden");
  }

  function navButtons(opts) {
    const o = Object.assign({ back: true, next: true, backText: "上一步", nextText: "下一步" }, opts || {});
    return `
      <div class="btns">
        <div>${o.back ? `<button type="button" class="btn-secondary" id="backBtn">${o.backText}</button>` : ""}</div>
        <div>${o.next ? `<button type="button" class="btn-primary" id="nextBtn">${o.nextText}</button>` : ""}</div>
      </div>
    `;
  }

  function renderScale(title, prefix, items, note) {
    const rows = items.map((item, idx) => {
      const q = idx + 1;
      return `<tr><td>${q}. ${escapeHtml(item)}</td>${
        LIKERT.map(v => `<td><label><input type="radio" name="${prefix}_${q}" value="${v}" ${String(state.answers[`${prefix}_${q}`]) === String(v) ? "checked" : ""}></label></td>`).join("")
      }</tr>`;
    }).join("");
    return `
      <div class="card">
        <h2>${escapeHtml(title)}</h2>
        ${note ? `<p class="muted">${escapeHtml(note)}</p>` : ""}
        <div style="overflow:auto;">
          <table class="scale-table">
            <thead>
              <tr>
                <th>题项</th>
                ${LIKERT.map(v => `<th>${v}<div class="small muted">${CFG.likertLabels[String(v)]}</div></th>`).join("")}
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${navButtons()}
      </div>
    `;
  }

  function renderMiniScale(prefix, items) {
    const rows = items.map((item, idx) => {
      const q = idx + 1;
      return `<tr><td>${q}. ${escapeHtml(item)}</td>${
        LIKERT.map(v => `<td><input type="radio" name="${prefix}_${q}" value="${v}" ${String(state.answers[`${prefix}_${q}`]) === String(v) ? "checked" : ""}></td>`).join("")
      }</tr>`;
    }).join("");
    return `
      <div style="overflow:auto;">
        <table class="scale-table">
          <thead><tr><th>题项</th>${LIKERT.map(v => `<th>${v}</th>`).join("")}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function radioChoice(name, value, label) {
    return `<label class="choice"><input type="radio" name="${name}" value="${value}" ${state.answers[name] === value ? "checked" : ""}>${escapeHtml(label)}</label>`;
  }

  function renderPage() {
    const step = currentStepKey();
    if (step === "consent") {
      return `
        <div class="card">
          <h2>研究说明与知情同意</h2>
          <p>您好！感谢您参加本研究。</p>
          <p>本研究旨在了解大学生在团队项目决策情境中的看法与行为倾向。您将阅读一个团队项目情境，并回答若干相关问题。整个过程大约需要 <strong>8–12分钟</strong>。</p>
          <p>请注意：</p>
          <p>1）本研究仅面向当前在读大学生；<br>2）您的回答仅用于学术研究，并以匿名方式进行统计分析；<br>3）您可以在任何时候退出作答。</p>
          <div class="field">
            <label>参与者编号（若老师已提供，可填写；若无可留空）</label>
            <input type="text" id="participant_code" value="${escapeHtml(state.participant_code || "")}" placeholder="例如：S202501" />
          </div>
          <div class="choices">
            <label class="choice"><input type="radio" name="consent" value="1" ${state.answers.consent === "1" ? "checked" : ""}>我同意并继续</label>
            <label class="choice"><input type="radio" name="consent" value="0" ${state.answers.consent === "0" ? "checked" : ""}>我不同意</label>
          </div>
          ${navButtons({back:false, nextText:"继续"})}

  function render() {
    updateProgress();
    const flash = state.flash_message || "";
    document.getElementById("app").innerHTML = `
      <div id="globalError" class="alert alert-error ${flash ? "" : "hidden"}">${flash}</div>
      ${renderPage()}
    `;
    state.flash_message = "";
    saveState();
    attachHandlers();
  }

  function validateScale(prefix, count) {
    for (let i = 1; i <= count; i++) {
      const s = document.querySelector(`input[name="${prefix}_${i}"]:checked`);
      if (!s) return { ok:false, message:"请完成本页所有题项。" };
      state.answers[`${prefix}_${i}`] = s.value;
    }
    saveState();
    return { ok:true };
  }

  function countWords(text) {
    if (!text || !text.trim()) return 0;
    const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
    const other = (text.replace(/[\u4e00-\u9fff]/g, " ").trim().match(/\S+/g) || []).length;
    return chinese + other;
  }
  function countChars(text) {
    return (text || "").replace(/\s/g, "").length;
  }

  function validateCurrentStep() {
    const step = currentStepKey();

    if (step === "consent") {
      state.participant_code = (document.getElementById("participant_code")?.value || "").trim();
      const s = document.querySelector('input[name="consent"]:checked');
      if (!s) return { ok:false, message:"请选择是否同意参加研究。" };
      state.answers.consent = s.value;
      saveState();
      if (s.value === "0") {
        state.completion_status = "declined";
        saveState();
        return { ok:true, terminal:true, title:"已结束", html:`<p>您已选择不同意参加研究，流程到此结束。</p><p class="muted small">系统编号：${escapeHtml(state.response_id)}</p>` };
      }
      return { ok:true };
    }

    if (step === "screening") {
      const a = document.querySelector('input[name="is_student"]:checked');
      const b = document.querySelector('input[name="has_team"]:checked');
      if (!a || !b) return { ok:false, message:"请完成两道筛选题。" };
      state.answers.is_student = a.value;
      state.answers.has_team = b.value;
      if (a.value === "0" || b.value === "0") {
        state.flags.screened_out = true;
        state.completion_status = "screened_out";
        saveState();
        return { ok:true, terminal:true, title:"感谢您的参与", html:`<p>由于本研究的样本要求，您暂不符合本次研究的参与条件。</p><p class="muted small">系统编号：${escapeHtml(state.response_id)}</p>` };
      }
      saveState();
      return { ok:true };
    }

    if (step === "comprehension") {
      const c1 = document.querySelector('input[name="comp1"]:checked');
      const c2 = document.querySelector('input[name="comp2"]:checked');
      if (!c1 || !c2) return { ok:false, message:"请完成两道理解题。" };
      state.answers.comp1 = c1.value;
      state.answers.comp2 = c2.value;
      const pass = c1.value === "B" && c2.value === "C";
      state.flags.comprehension_pass = pass;
      if (!pass) {
        state.comprehension_attempts = (state.comprehension_attempts || 0) + 1;
        saveState();
        if (state.comprehension_attempts === 1) {
          return { ok:true, jumpTo:3, flash_message:"理解题未通过，请重新阅读上一页情境后再次作答。" };
        }
      }
      saveState();
      return { ok:true };
    }

    if (step === "cf") return validateScale("cf", CFG.items.cf.length);
    if (step === "ad") return validateScale("ad", CFG.items.ad.length);
    if (step === "cd") return validateScale("cd", CFG.items.cd.length);
    if (step === "mcs") return validateScale("mcs", CFG.items.mcs.length);
    if (step === "mct") return validateScale("mct", CFG.items.mct.length);

    if (step === "behavior") {
      const choice = document.querySelector('input[name="continue_choice"]:checked');
      if (!choice) return { ok:false, message:"请选择是否愿意继续完善这个想法。" };
      state.answers.continue_choice = choice.value;
      if (choice.value === "1") {
        const text = (document.getElementById("continue_text")?.value || "").trim();
        state.answers.continue_text = text;
        state.answers.continue_word_count = countWords(text);
        state.answers.continue_char_count = countChars(text);
        if (CFG.enableResourceTask) {
          const p = document.getElementById("rejected_points")?.value;
          if (p === "" || p == null) return { ok:false, message:"请填写资源积分分配。" };
          const num = Number(p);
          if (Number.isNaN(num) || num < 0 || num > 100) return { ok:false, message:"资源积分必须在 0 到 100 之间。" };
          state.answers.rejected_points = num;
        }
      } else {
        state.answers.continue_text = "";
        state.answers.continue_word_count = 0;
        state.answers.continue_char_count = 0;
        state.answers.rejected_points = 0;
      }
      saveState();
      return { ok:true };
    }

    if (step === "robustness") {
      for (const prefix of ["iq","rf"]) {
        const count = CFG.items[prefix].length;
        for (let i = 1; i <= count; i++) {
          const s = document.querySelector(`input[name="${prefix}_${i}"]:checked`);
          if (!s) return { ok:false, message:"请完成本页所有题项。" };
          state.answers[`${prefix}_${i}`] = s.value;
        }
      }
      saveState();
      return { ok:true };
    }

    if (step === "background") {
      const fields = ["gender","age","study_stage","discipline","team_type","team_role","project_tenure","team_size","ai_frequency"];
      for (const f of fields) {
        const el = document.getElementById(f);
        const val = (el && typeof el.value === "string") ? el.value.trim() : (el ? el.value : "");
        if (!val) return { ok:false, message:"请完整填写基本信息。" };
        state.answers[f] = val;
      }
      const att = document.querySelector('input[name="attention_check"]:checked');
      if (!att) return { ok:false, message:"请完成注意力检测题。" };
      state.answers.attention_check = att.value;
      state.flags.attention_pass = att.value === "比较同意";
      saveState();
      return { ok:true };
    }

    if (step === "submit") {
      return { ok:true, customSubmit:true };
    }

    return { ok:true };
  }

  function buildPayload() {
    const totalDuration = Math.max(0, Math.round((Date.now() - new Date(state.started_at_iso).getTime()) / 1000));
    const cond = conditionObj();
    const excludeReasons = [];
    if (state.answers.is_student === "0") excludeReasons.push("not_student");
    if (state.answers.has_team === "0") excludeReasons.push("no_team_experience");
    if (state.flags.attention_pass === false) excludeReasons.push("attention_fail");
    if (state.flags.comprehension_pass === false) excludeReasons.push("comprehension_fail");
    if (totalDuration < 180) excludeReasons.push("fast_completion_lt_180s");

    return Object.assign({
      response_id: state.response_id,
      participant_code: state.participant_code || "",
      condition_key: state.condition_key,
      condition_label: cond.label,
      ai_support_condition: cond.ai_support,
      transparency_condition: cond.transparency,
      started_at_iso: state.started_at_iso,
      submitted_at_iso: new Date().toISOString(),
      total_duration_sec: totalDuration,
      page_times_sec_json: JSON.stringify(state.page_times_sec || {}),
      comprehension_attempts: state.comprehension_attempts || 0,
      comprehension_pass: state.flags.comprehension_pass === true ? 1 : 0,
      attention_pass: state.flags.attention_pass === true ? 1 : 0,
      exclude_flag: excludeReasons.length ? 1 : 0,
      exclude_reason: excludeReasons.join(";"),
      completion_status: "completed",
      continue_word_count: state.answers.continue_word_count || 0,
      continue_char_count: state.answers.continue_char_count || 0,
      continue_nonempty: (state.answers.continue_text || "").trim() ? 1 : 0
    }, state.answers);
  }

  function downloadJson(obj, filename) {
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type: "application/json;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function submitNow() {
    recordPageTime();
    const payload = buildPayload();
    let sent = false;
    try {
      if (CFG.submitUrl) {
        await fetch(CFG.submitUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        sent = true;
      }
    } catch (e) {
      sent = false;
    }
    downloadJson(payload, "submission_" + payload.response_id + ".json");
    state.completion_status = "completed";
    state.submitted_at_iso = new Date().toISOString();
    saveState();
    renderTerminal("感谢您的参与", `<p>您的作答已完成。</p><p>${sent ? "系统已尝试将数据发送到研究者的数据表。" : "当前未配置在线接收地址，系统已自动下载一份 JSON 备份文件。"}</p><p class="muted small">系统编号：${escapeHtml(payload.response_id)}</p>`);
  }

  function renderTerminal(title, htmlText) {
    updateProgress();
    document.getElementById("app").innerHTML = `
      <div class="card center">
        <h2>${title}</h2>
        ${htmlText}
        <div class="btns" style="justify-content:center;">
          <button class="btn-secondary" id="restartBtn">重新开始（测试用）</button>
        </div>
      </div>
    `;
    document.getElementById("restartBtn").addEventListener("click", resetSession);
  }

  async function goNext() {
    clearError();
    const result = validateCurrentStep();
    if (!result.ok) {
      showError(result.message || "请完成当前页面后再继续。");
      return;
    }
    if (result.terminal) {
      renderTerminal(result.title || "提示", result.html || "<p>流程已结束。</p>");
      return;
    }
    recordPageTime();
    if (typeof result.jumpTo === "number") {
      state.stepIndex = result.jumpTo;
      state.flash_message = result.flash_message || "";
      saveState();
      render();
      return;
    }
    if (result.customSubmit) {
      await submitNow();
      return;
    }
    state.stepIndex += 1;
    saveState();
    render();
  }

  function goBack() {
    if (state.stepIndex <= 0) return;
    clearError();
    recordPageTime();
    state.stepIndex -= 1;
    saveState();
    render();
  }

  function attachHandlers() {
    const next = document.getElementById("nextBtn");
    const back = document.getElementById("backBtn");
    const reset = document.getElementById("resetBtn");
    if (next) next.addEventListener("click", goNext);
    if (back) back.addEventListener("click", goBack);
    if (reset) reset.addEventListener("click", resetSession);

    const pc = document.getElementById("participant_code");
    if (pc) {
      pc.addEventListener("input", function(e) {
        state.participant_code = (e.target.value || "").trim();
        saveState();
      });
    }

    document.querySelectorAll('input[name="continue_choice"]').forEach(el => {
      el.addEventListener("change", function() {
        const show = document.querySelector('input[name="continue_choice"]:checked')?.value === "1";
        const block = document.getElementById("continueBlock");
        if (block) block.classList.toggle("hidden", !show);
      });
    });
  }

  function renderCrash(err) {
    const app = document.getElementById("app");
    app.innerHTML = `
      <div class="card">
        <h2>页面脚本出错</h2>
        <p class="muted">这说明不是你不会操作，而是网页脚本本身出错了。</p>
        <div class="alert alert-error" style="display:block;">
          <strong>错误信息：</strong><br>${escapeHtml(err && (err.stack || err.message) || String(err))}
        </div>
        <div class="footer-note">请把这段报错截图发给我，我可以继续修。</div>
      </div>
    `;
  }

  try {
    state = loadState();
    pageEnterTs = Date.now();
    render();
  } catch (err) {
    console.error(err);
    renderCrash(err);
  }
})();
</script>
</body>
</html>
